name: Daily Collection & Quality Check

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ai-knowledge-base-v3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: projects/ai-knowledge-base-v3/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate article JSON schemas
        continue-on-error: true
        run: |
          files=$(find knowledge/articles -maxdepth 1 -name "*.json" -type f 2>/dev/null || true)
          if [ -n "$files" ]; then
            python hooks/validate_json.py $files
          else
            echo "No article files found, skipping validation"
          fi

      - name: Check article quality
        continue-on-error: true
        run: |
          files=$(find knowledge/articles -maxdepth 1 -name "*.json" -type f 2>/dev/null || true)
          if [ -n "$files" ]; then
            python hooks/check_quality.py --no-color $files
          else
            echo "No article files found, skipping quality check"
          fi

      - name: Commit and push new articles
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/ai-knowledge-base-v3/knowledge/
          if ! git diff --staged --quiet; then
            count=$(find projects/ai-knowledge-base-v3/knowledge/articles -maxdepth 1 -name "*.json" -type f 2>/dev/null | wc -l)
            date_str=$(date +'%Y-%m-%d')
            git commit -m "chore: auto collect ${count} articles on ${date_str}"
            git push
          else
            echo "No new data to commit"
          fi
